<!DOCTYPE html>
<html><head><style>
html { background: #0F172A; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #0F172A; font-family: Arial, Helvetica, sans-serif;
  display: flex;
}
.container { width: 100%; height: 100%; padding: 36pt; box-sizing: border-box; }
.h1 { font-size: 40pt; color: #22C55E; margin: 0 0 10pt 0; }
.h2 { font-size: 28pt; color: #E2E8F0; margin: 0 0 10pt 0; }
.p { font-size: 18pt; color: #F8FAFC; margin: 6pt 0; }
.small { font-size: 14pt; color: #CBD5E1; }
.card { background: #111827; border-radius: 12pt; padding: 16pt; }
.badge { display: inline-block; background: #22C55E; color: #0F172A; padding: 4pt 10pt; border-radius: 10pt; font-size: 14pt; font-weight: bold; }
.grid { display: flex; gap: 16pt; }
.col { flex: 1; }
.icon { width: 64pt; height: 64pt; }
</style></head>
<body>

<div class='container'>
  <h2 class='h2'>明天：摆动累计 100 次</h2>
  <div class='grid'>
    <div class='col card'>
      <p class='p'><span class='badge'>方案A</span> 10 组 × 10 次</p>
      <p class='p'>组间休息 45–60 秒</p>
      <p class='p'>热身 6–8 分钟</p>
      <p class='p'>收操 5 分钟</p>
    </div>
    <div class='col card'>
      <p class='p'><span class='badge'>方案B</span> 5 组 × 20 次</p>
      <p class='p'>组间休息 60–90 秒</p>
      <p class='p'>感觉轻松时选择</p>
      <img src='/Users/zhangxh/.openclaw/workspace/pptx_assets/checklist.png' class='icon' />
    </div>
  </div>
</div>

</body></html>
